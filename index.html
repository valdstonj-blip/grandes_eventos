    <script>
      (function() {
        var path = window.location.pathname;
        if (window.location.hostname.endsWith('github.io') && !path.endsWith('/') && !path.split('/').pop().includes('.')) {
          window.location.replace(window.location.href + '/');
        }
      })();
    </script>
